<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이메일 인증 완료 - LibreFlow</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- CSS 연결 -->
    <link rel="stylesheet" href="style.css">
    
    <style>
        .verify-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 2rem;
            position: relative;
            z-index: 2;
        }
        .verify-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 3rem 2rem;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .success-icon-wrapper {
            width: 80px;
            height: 80px;
            background: rgba(16, 185, 129, 0.1);
            border: 2px solid rgba(16, 185, 129, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem auto;
            color: #10b981;
        }
        .success-icon-wrapper svg {
            width: 40px;
            height: 40px;
        }
        .verify-card h1 {
            font-size: 1.75rem;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }
        .verify-card p {
            color: var(--text-secondary);
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <!-- 배경 글로우 데코레이션 -->
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <div class="verify-container">
        <div class="verify-card">
            <div class="success-icon-wrapper">
                <i data-lucide="check-circle-2"></i>
            </div>
            <h1>이메일 인증이 완료되었습니다!</h1>
            <p>회원가입이 성공적으로 승인되었습니다.<br>이제 LibreFlow의 모든 도서대여 서비스를 이용하실 수 있습니다.</p>
            <a href="index.html" class="btn btn-primary btn-block">로그인 페이지로 이동</a>
        </div>
    </div>

    <script>
        // 아이콘 렌더링
        lucide.createIcons();
    </script>
</body>
</html>
